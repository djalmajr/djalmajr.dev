name: deploy

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Install bun"
        uses: oven-sh/setup-bun@v2

      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🚀 Build the project"
        run: bun run build

      # Deploys only once CLOUDFLARE_API_TOKEN is set in repo secrets.
      # Project name and output dir come from wrangler.toml (djalmajr-dev / dist).
      - name: "🌥️ Deploy to Cloudflare Pages"
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --branch=main
